server:
  port: ${SERVER_PORT:8081}

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        spring.json.write.dates.as.timestamps: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: ru.otus.hw.kafka.event,com.urlshortener.kafka.event
        spring.json.type.mapping: |
          ru.otus.hw.kafka.event.UserDeletedEvent:com.urlshortener.kafka.event.UserDeletedEvent,
          ru.otus.hw.kafka.event.UrlCreatedEvent:com.urlshortener.kafka.event.UrlCreatedEvent

  application:
    name: url-service

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}


    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://admin:secret@mongo:27017/urlshortener?authSource=admin}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers

resilience4j:
  ratelimiter:
    instances:
      createUrl:
        limit-for-period: 10
        limit-refresh-period: 60s
        timeout-duration: 0s
      getUrl:
        limit-for-period: 100
        limit-refresh-period: 60s
        timeout-duration: 0s

logging:
  level:
    root: INFO
    com.example.urlshortener: DEBUG